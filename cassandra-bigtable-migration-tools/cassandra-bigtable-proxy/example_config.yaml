cassandraToBigtableConfigs:

listeners:
- name: cluster1
  port: 9042
  bigtable:
    projectId: google.com:cloud-bigtable-dev

    instances:
    - bigtableInstance: bigtabledevinstance
      keyspace: my_cassandra_keyspace
      appProfileID: my-bigtable-app-profile
    - bigtableInstance: bigtabledevinstance-2
      keyspace: my_cassandra_keyspace_2
      appProfileID: my-bigtable-app-profile-2

    appProfileID: my-bigtable-app-profile
    Session:
      grpcChannels: 4
    enableMetadataRefresh: true

otel:
  enabled: False
